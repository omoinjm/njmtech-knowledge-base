name: Python Docker CI
on:
  push:
    branches: ["development", "staging"]
    paths:
      - "apps/yt-transcribe/**"
      - ".github/workflows/yt-transcribe-build.yml"
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/yt-transcribe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/yt-transcribe/go.mod
      - name: Install dependencies
        run: |
          go mod download
      - name: Build
        run: |
          go build -v ./...
      - name: Test
        run: |
          go test ./...
  docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/yt-transcribe
          file: ./apps/yt-transcribe/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/njmtech-yt-transcribe:latest
