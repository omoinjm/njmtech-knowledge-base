name: Deploy Upload Blob Worker

on:
  push:
    branches: [main]
    paths:
      - "apps/upload-blob/**"
      - ".github/workflows/upload-blob-cloudflare.yml"
  workflow_dispatch:

concurrency:
  group: deploy-upload-blob-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/upload-blob

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          npm ci
          uv sync

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          uv run pywrangler deploy
