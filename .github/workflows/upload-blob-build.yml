name: Python Docker CI
on:
  push:
    branches: ["development", "staging"]
    paths:
      - "apps/upload-blob/**"
      - ".github/workflows/upload-blob-build.yml"
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/upload-blob
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          npm ci
          pip install uv
          uv sync
      - name: Validate Python sources
        run: |
          uv run python -m compileall api worker.py
  docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/upload-blob
          file: ./apps/upload-blob/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/njmtech-upload-blob:latest
