name: blob-cron | build-and-docker

on:
  push:
    branches: ["development", "staging"]
    paths:
      - "apps/blob-cron/**"
      - ".github/workflows/blob-cron-build.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/blob-cron

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --dev

      - name: Validate Python sources
        run: |
          uv run python -m compileall src main.py

      - name: Test
        run: |
          uv run python -m pytest

  docker:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/blob-cron
          file: ./apps/blob-cron/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/njmtech-blob-cron:latest
